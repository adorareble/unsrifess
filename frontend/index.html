<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsr!fess</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000; color: #e7e9ea; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .container { width: 100%; max-width: 600px; padding: 20px; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 1.4rem; font-weight: 700;
    background: linear-gradient(135deg, #1d9bf0, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle { font-size: 0.75rem; color: #4a4b4e; -webkit-text-fill-color: #4a4b4e; }
  .card {
    background: #16181c; border: 1px solid #2f3336; border-radius: 20px;
    padding: 20px;
  }
  .status-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    font-size: 0.85rem; color: #71767b;
  }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.online { background: #00ba7c; box-shadow: 0 0 8px rgba(0,186,124,0.4); }
  .status-dot.offline { background: #f4212e; }
  .status-badge {
    margin-left: auto;
    padding: 2px 10px; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600;
    border: 1px solid #2f3336;
  }
  .keyword-hint {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 12px; font-size: 0.8rem;
    padding: 8px 12px; border-radius: 8px;
    background: rgba(29,155,240,0.08); border: 1px solid rgba(29,155,240,0.15);
    color: #1d9bf0;
  }
  .keyword-hint code {
    background: rgba(29,155,240,0.15); padding: 1px 6px;
    border-radius: 4px; font-weight: 600;
  }
  textarea {
    width: 100%; background: transparent; border: 1px solid #2f3336;
    border-radius: 12px; color: #e7e9ea; font-size: 1rem;
    padding: 14px; resize: vertical; min-height: 130px; font-family: inherit;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: #1d9bf0; box-shadow: 0 0 0 2px rgba(29,155,240,0.15); }
  textarea.error { border-color: #f4212e; box-shadow: 0 0 0 2px rgba(244,33,46,0.15); }
  .tweet-count {
    margin-top: 6px; font-size: 0.85rem; font-weight: 500;
    min-height: 1.2em;
  }
  .tweet-count.over { color: #f4212e; }
  .tweet-count.ok { color: #00ba7c; }
  .tweet-count.info { color: #71767b; }
  .upload-area {
    border: 1px dashed #2f3336; border-radius: 12px; padding: 14px;
    text-align: center; margin-top: 12px; cursor: pointer; color: #71767b;
    transition: all 0.2s; font-size: 0.9rem;
  }
  .upload-area:hover { border-color: #1d9bf0; color: #1d9bf0; background: rgba(29,155,240,0.04); }
  .upload-area.has-file { border-color: #00ba7c; }
  .upload-area.disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-area.disabled:hover { border-color: #2f3336; color: #71767b; background: none; }
  .file-grid {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
    justify-content: center;
  }
  .file-preview {
    width: 90px; height: 90px;
    border-radius: 10px; overflow: hidden; border: 1px solid #2f3336;
    position: relative; flex-shrink: 0;
  }
  .file-preview img { width: 100%; height: 100%; object-fit: cover; }
  .file-preview .remove {
    position: absolute; top: 2px; right: 2px; width: 22px; height: 22px;
    background: rgba(0,0,0,0.75); border: none; border-radius: 50%;
    color: #fff; font-size: 0.75rem; cursor: pointer; line-height: 22px;
    text-align: center; transition: background 0.2s;
  }
  .file-preview .remove:hover { background: rgba(244,33,46,0.8); }
  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 9999px;
    color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-top: 16px; transition: all 0.2s;
  }
  .btn-primary { background: #1d9bf0; }
  .btn-primary:hover:not(:disabled) { background: #1a8cd8; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-success { background: #00ba7c; }
  .btn-success:hover { background: #009d68; }
  .validate-msg {
    font-size: 0.82rem; min-height: 1.2em; margin-top: 6px;
    padding: 0 4px; transition: all 0.2s;
  }
  .validate-msg.error { color: #f4212e; }
  .validate-msg.ok { color: #00ba7c; }
  .loading-overlay {
    position: absolute; inset: 0; z-index: 10;
    border-radius: 20px; overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px;
    background: rgba(22,24,28,0.92); backdrop-filter: blur(4px);
  }
  .card-wrap { position: relative; }
  .spinner {
    width: 48px; height: 48px; border: 4px solid #2f3336;
    border-top-color: #1d9bf0; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #e7e9ea; font-size: 0.95rem; font-weight: 500; }
  .loading-detail { color: #71767b; font-size: 0.8rem; }
  .progress-track {
    width: 70%; height: 4px; background: #2f3336; border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%; width: 0%; background: linear-gradient(90deg, #1d9bf0, #8b5cf6);
    border-radius: 2px; transition: width 0.3s ease;
    animation: progressPulse 1.5s ease-in-out infinite;
  }
  @keyframes progressPulse {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
  }
  .result {
    margin-top: 16px; padding: 16px; border-radius: 12px;
    font-size: 0.95rem; text-align: center; display: none;
    overflow-wrap: break-word; word-break: break-word;
  }
  .result.success { display: block; background: #00321c; color: #00ba7c; border: 1px solid #00ba7c; }
  .result.error { display: block; background: #2c0a0e; color: #f4212e; border: 1px solid #f4212e; }
  .result a { color: #1d9bf0; overflow-wrap: break-word; word-break: break-all; }
  .result .url-list { margin-top: 8px; list-style: none; }
  .result .url-list li { margin-bottom: 4px; }
  .hidden { display: none !important; }
  input[type="file"] { display: none; }
  .done-actions { display: flex; gap: 10px; margin-top: 16px; }
  .done-actions .btn { margin-top: 0; flex: 1; }
  .btn-outline {
    background: transparent; border: 1px solid #2f3336;
    color: #e7e9ea;
  }
  .btn-outline:hover { background: rgba(239,243,244,0.05); }
  @media (max-width: 480px) {
    .container { padding: 12px; }
    .card { padding: 16px; border-radius: 16px; }
    .header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="container">
    <div class="header">
      <div>
        <h1>Unsr!fess</h1>
        <div class="subtitle" id="subtitle">Confess anonymously on X</div>
      </div>
      <div class="status-bar" style="margin-bottom:0">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking...</span>
      </div>
    </div>

  <div class="card card-wrap">
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <div class="loading-text">Posting...</div>
      <div class="loading-detail" id="loadingDetail">Sending to X</div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div style="color:#4a4b4e;font-size:0.75rem;margin-top:8px">
        Closing the browser won't cancel the process
      </div>
    </div>

    <div id="composeArea">
      <div class="keyword-hint">
        <span>&#9432;</span>
        <span>Your message must contain <code style="color: #f4c430;">unsr!</code> to be sent.</span>
      </div>

      <textarea id="tweetText" placeholder="What would you like to share?" maxlength="3000"></textarea>
      <div class="tweet-count info" id="tweetCount"></div>
      <div class="validate-msg" id="validateMsg"></div>

      <div class="upload-area" id="uploadArea">
        <div class="upload-label">+ Add images (max 4)</div>
        <div class="file-grid" id="fileGrid"></div>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple>

      <button class="btn btn-primary" id="submitBtn" disabled>Send</button>
    </div>

    <div id="rateLimitMsg" class="hidden"></div>

    <div id="doneArea" class="hidden">
      <div class="result" id="result"></div>
      <div class="done-actions">
        <button class="btn btn-success" id="newBtn">New confession</button>
        <button class="btn btn-outline hidden" id="retryBtn">Try again</button>
      </div>
    </div>
  </div>
</div>

<script>
const MAX_CHARS = 280;
const MAX_IMAGES = 4;
let selectedFiles = [];

const tweetText = document.getElementById('tweetText');
const tweetCount = document.getElementById('tweetCount');
const validateMsg = document.getElementById('validateMsg');
const submitBtn = document.getElementById('submitBtn');
const loadingOverlay = document.getElementById('loadingOverlay');
const progressBar = document.getElementById('progressBar');

function estimateTweets(text) {
  const len = text.length;
  if (len === 0) return 0;
  if (len <= MAX_CHARS) return 1;
  let remaining = text.trim();
  let count = 0;
  while (remaining.length > 0) {
    count++;
    if (remaining.length <= MAX_CHARS) break;
    let splitAt = remaining.lastIndexOf(". ", MAX_CHARS);
    if (splitAt < 0) splitAt = remaining.lastIndexOf("\n", MAX_CHARS);
    if (splitAt < 0) splitAt = remaining.lastIndexOf(" ", MAX_CHARS);
    if (splitAt < 0) splitAt = MAX_CHARS;
    else splitAt++;
    remaining = remaining.slice(splitAt).trim();
  }
  return count;
}

function showCompose() {
  document.getElementById('composeArea').classList.remove('hidden');
  document.getElementById('rateLimitMsg')?.classList.add('hidden');
  document.getElementById('doneArea').classList.add('hidden');
}

function showLoading() {
  loadingOverlay.classList.remove('hidden');
  progressBar.style.width = '0%';
  let p = 0;
  const interval = setInterval(() => {
    p = Math.min(p + Math.random() * 12, 85);
    progressBar.style.width = p + '%';
  }, 800);
  loadingOverlay._interval = interval;
}

function hideLoading() {
  clearInterval(loadingOverlay._interval);
  progressBar.style.width = '100%';
  setTimeout(() => {
    loadingOverlay.classList.add('hidden');
    progressBar.style.width = '0%';
  }, 300);
}

function showDone() {
  isDone = true;
  document.getElementById('composeArea').classList.add('hidden');
  document.getElementById('doneArea').classList.remove('hidden');
}

function updateValidation() {
  const text = tweetText.value;
  const hasKeyword = /unsr!/i.test(text);
  const isEmpty = text.trim().length === 0;

  if (isEmpty) {
    validateMsg.className = 'validate-msg';
    validateMsg.textContent = '';
    tweetText.classList.remove('error');
    return hasKeyword && !isEmpty;
  }

  if (!hasKeyword) {
    validateMsg.className = 'validate-msg error';
    validateMsg.textContent = 'Must contain "unsr!" in your message';
    tweetText.classList.add('error');
  } else {
    validateMsg.className = 'validate-msg ok';
    validateMsg.textContent = '\u2713 Contains "unsr!"';
    tweetText.classList.remove('error');
  }

  return hasKeyword;
}

function updateTweetCount() {
  const text = tweetText.value;
  const el = tweetCount;
  const len = text.length;

  if (len === 0) {
    el.className = 'tweet-count info';
    el.textContent = '';
  } else if (len > MAX_CHARS) {
    const n = estimateTweets(text);
    el.className = 'tweet-count over';
    el.textContent = '\u26A0 ' + len + ' chars (\u2192 ' + n + ' tweets)';
  } else {
    el.className = 'tweet-count ok';
    el.textContent = len + '/' + MAX_CHARS;
  }
}

function updateFilePreview() {
  const grid = document.getElementById('fileGrid');
  const area = document.getElementById('uploadArea');
  grid.innerHTML = '';
  const remaining = MAX_IMAGES - selectedFiles.length;

  area.classList.toggle('has-file', selectedFiles.length > 0);
  area.classList.toggle('disabled', remaining === 0);
  const label = area.querySelector('.upload-label');
  label.textContent = remaining === 0
    ? 'Max 4 images reached'
    : `+ Add images (${remaining} left)`;

  selectedFiles.forEach((file, idx) => {
    const div = document.createElement('div');
    div.className = 'file-preview';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    div.appendChild(img);
    const btn = document.createElement('button');
    btn.className = 'remove';
    btn.innerHTML = '&times;';
    btn.onclick = (e) => {
      e.stopPropagation();
      selectedFiles.splice(idx, 1);
      updateFilePreview();
    };
    div.appendChild(btn);
    grid.appendChild(div);
  });
}

function checkSubmitReady() {
  const text = tweetText.value.trim();
  const valid = /unsr!/i.test(text);
  submitBtn.disabled = !valid || rateLimited;
}

let rateLimited = false;
let rateResetAt = null;
let isDone = false;

(function restoreRate() {
  const saved = localStorage.getItem('unsr_reset_at');
  if (saved) {
    const t = parseFloat(saved);
    if (t > Date.now() / 1000) {
      rateLimited = true;
      rateResetAt = t;
    }
  }
})();

function saveResetAt(t) {
  if (t && t > 0) {
    localStorage.setItem('unsr_reset_at', t.toString());
  }
}

function showCooldown(resetAt) {
  const t = new Date(resetAt * 1000);
  const now = new Date();
  const waitMin = Math.ceil((t - now) / 60000);
  document.getElementById('statusText').textContent = 'Cooldown ' + waitMin + 'm \u2022 0/5';
  document.getElementById('composeArea').classList.add('hidden');
  document.getElementById('rateLimitMsg')?.classList.remove('hidden');
  const msg = document.getElementById('rateLimitMsg');
  if (msg) {
    const h = t.getHours().toString().padStart(2,'0');
    const m = t.getMinutes().toString().padStart(2,'0');
    msg.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#71767b"><div style="font-size:2rem;margin-bottom:12px">&#9200;</div><div style="font-size:1rem;font-weight:600;color:#e7e9ea;margin-bottom:8px">You\'ve used all 5 confessions</div><div style="font-size:0.9rem">Next available at <strong>' + h + ':' + m + '</strong> (~' + waitMin + ' min)</div></div>';
  }
}

async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    dot.className = 'status-dot ' + (data.logged_in ? 'online' : 'offline');
    rateLimited = !!data.rate_limited;
    rateResetAt = data.reset_at || null;
    saveResetAt(data.reset_at);

    if (rateLimited) {
      showCooldown(data.reset_at);
    } else {
      text.textContent = data.remaining + ' remaining';
      const saved = localStorage.getItem('unsr_reset_at');
      if (saved && parseFloat(saved) > Date.now() / 1000 && !isDone) {
        rateLimited = true;
        rateResetAt = parseFloat(saved);
        showCooldown(rateResetAt);
      } else if (!isDone) {
        document.getElementById('composeArea').classList.remove('hidden');
        document.getElementById('rateLimitMsg')?.classList.add('hidden');
      }
    }
  } catch {
    dot.className = 'status-dot offline';
  }
  checkSubmitReady();
}

tweetText.addEventListener('input', () => {
  updateTweetCount();
  updateValidation();
  checkSubmitReady();
});

document.getElementById('uploadArea').addEventListener('click', () => {
  if (selectedFiles.length >= MAX_IMAGES) return;
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  const remaining = MAX_IMAGES - selectedFiles.length;
  selectedFiles = selectedFiles.concat(files.slice(0, remaining));
  updateFilePreview();
  e.target.value = '';
});

document.getElementById('newBtn').addEventListener('click', resetForm);

function resetForm() {
  isDone = false;
  if (rateLimited) { checkStatus(); return; }
  tweetText.value = '';
  document.getElementById('result').className = 'result';
  document.getElementById('result').style.display = 'none';
  selectedFiles = [];
  updateFilePreview();
  updateTweetCount();
  validateMsg.className = 'validate-msg';
  validateMsg.textContent = '';
  tweetText.classList.remove('error');
  showCompose();
  checkSubmitReady();
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  const text = tweetText.value.trim();
  if (!text || !/unsr!/i.test(text)) return;

  showLoading();
  submitBtn.disabled = true;

  const formData = new FormData();
  formData.append('text', text);
  for (const file of selectedFiles) {
    formData.append('images', file);
  }

  try {
    const r = await fetch('/api/tweet-sync', { method: 'POST', body: formData });
    const data = await r.json();
    hideLoading();

    const result = document.getElementById('result');
    const retryBtn = document.getElementById('retryBtn');
    if (data.success) {
      let html = 'Tweet sent successfully!';
      if (data.urls && data.urls.length > 0) {
        html = '<ul class="url-list">';
        data.urls.forEach((url, i) => {
          const label = data.urls.length > 1 ? 'Tweet ' + (i + 1) + ': ' : '';
          html += '<li>' + label + '<a href="' + url + '" target="_blank">' + url + '</a></li>';
        });
        html += '</ul>';
      }
      result.className = 'result success';
      result.innerHTML = html;
      retryBtn.classList.add('hidden');
    } else {
      const msg = friendlyError(data);
      result.className = 'result error';
      result.innerHTML = msg;
      retryBtn.classList.add('hidden');
      if (data.rate_limited) {
        rateLimited = true;
        rateResetAt = data.reset_at;
      }
    }
    submitBtn.disabled = false;
    if (data.reset_at) saveResetAt(data.reset_at);
    checkStatus();
    showDone();
  } catch (err) {
    hideLoading();
    submitBtn.disabled = false;
    document.getElementById('result').className = 'result error';
    document.getElementById('result').textContent = 'Connection error. Check your internet and try again.';
    document.getElementById('retryBtn').classList.remove('hidden');
    showDone();
  }
});

document.getElementById('retryBtn').addEventListener('click', () => {
  selectedFiles = [];
  updateFilePreview();
  showCompose();
  checkSubmitReady();
});

function friendlyError(data) {
  const msg = data.error || '';
  if (data.rate_limited) {
    const t = new Date(data.reset_at * 1000);
    const now = new Date();
    const waitMin = Math.ceil((t - now) / 60000);
    const h = t.getHours().toString().padStart(2,'0');
    const m = t.getMinutes().toString().padStart(2,'0');
    return 'You\'ve used all 5 confessions for this hour.<br>Next available at <strong>' + h + ':' + m + '</strong> (~' + waitMin + ' min).';
  }
  if (!msg) return 'Something went wrong. Please try again.';
  if (msg.includes('duplicate')) return 'This tweet looks like a duplicate.';
  if (msg.includes('timeout') || msg.includes('Timeout')) return 'Request timed out. Please try again.';
  if (msg.includes('closed') || msg.includes('crash')) return 'Server is busy. Please try again.';
  if (msg.includes('login') || msg.includes('auth')) return 'Session expired. Please contact admin.';
  if (msg.includes('Could not find')) return 'Could not post. X.com layout may have changed.';
  return msg.length > 120 ? 'Something went wrong. Please try again.' : msg;
}

checkStatus();
setInterval(checkStatus, 30000);
</script>
</body>
</html>
