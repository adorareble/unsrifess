services:
  - type: web
    name: twittertools
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
