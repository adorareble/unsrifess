services:
  - type: web
    name: twittertools
    env: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium 2>&1 || true
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS
        value: "true"
